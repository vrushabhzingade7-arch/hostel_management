{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Select Department</title>

    <style>
        body {
            font-family: "Segoe UI", sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            margin: 0;
            padding: 0;
        }

        .container {
            width: 80%;
            margin: 60px auto;
            text-align: center;
        }

        h2 {
            color: white;
            margin-bottom: 30px;
        }

        .card-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
        }

        .card {
            width: 200px;
            padding: 25px;
            border-radius: 12px;
            background: white;
            color: #333;
            text-decoration: none;
            font-weight: bold;
            font-size: 18px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.2);
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
            background: #3498db;
            color: white;
        }

        .back-btn {
            margin-top: 40px;
            display: inline-block;
            padding: 10px 20px;
            border-radius: 20px;
            background: white;
            color: #333;
            text-decoration: none;
            font-weight: bold;
        }

        .back-btn:hover {
            background: #ddd;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>📂 Select Department</h2>

    <div class="card-container">
        {% for dept in departments %}
            <a href="{% url 'leave_requests' %}?dept={{ dept }}" class="card">
                {{ dept }}
            </a>
        {% empty %}
            <p style="color:white;">No departments found.</p>
        {% endfor %}
    </div>

    <a href="{% url 'admin_dashboard' %}" class="back-btn">← Back</a>
</div>

</body>
</html>
