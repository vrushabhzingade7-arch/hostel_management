<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hostel Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <!-- Sidebar -->
    <div class="sidebar">
        <h2>Hostel</h2>
        <ul>
            <li><a href="#">Dashboard</a></li>
            <li><a href="#">Students</a></li>
            <li><a href="#">Rooms</a></li>
            <li><a href="#">Leave</a></li>
            <li><a href="#">Reports</a></li>
        </ul>
    </div>

    <!-- Main Content -->
    <div class="main">

        <div class="header">
            <h1>Dashboard</h1>
        </div>

        <div class="cards">
            <div class="card">
                <h3>Total Students</h3>
                <p>120</p>
            </div>

            <div class="card">
                <h3>Present</h3>
                <p>100</p>
            </div>

            <div class="card">
                <h3>On Leave</h3>
                <p>20</p>
            </div>
        </div>

        <div class="table-section">
            <h2>Student List</h2>
            <table>
                <tr>
                    <th>Name</th>
                    <th>Room</th>
                    <th>Status</th>
                </tr>
                <tr>
                    <td>Rahul</td>
                    <td>101</td>
                    <td>Present</td>
                </tr>
                <tr>
                    <td>Amit</td>
                    <td>102</td>
                    <td>Leave</td>
                </tr>
            </table>
        </div>

    </div>

</div>

</body>
</html>
