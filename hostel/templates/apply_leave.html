{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Apply Leave</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:'Segoe UI', sans-serif;
            background:#f4f7fb;
        }

        .container{
            display:flex;
            min-height:100vh;
        }

/* SIDEBAR */
.sidebar{
    width:250px;
    height:100vh;
    background:#2c3e50;
    color:white;
    padding:20px;
    position:fixed;
    top:0;
    left:0;
    overflow-y:auto;
}

.sidebar h2{
    text-align:center;
    margin-bottom:35px;
    font-size:28px;
    line-height:1.4;
    font-weight:700;
}

.sidebar ul{
    list-style:none;
    padding:0;
    margin:0;
}

.sidebar ul li{
    margin-bottom:8px;
}

.sidebar ul li a{
    display:flex;
    align-items:center;
    gap:10px;
    padding:12px 14px;
    color:#ecf0f1;
    text-decoration:none;
    border-radius:10px;
    transition:0.3s;
    font-size:17px;
    font-weight:500;
}

.sidebar ul li a:hover{
    background:#34495e;
    transform:translateX(5px);
}

/* MAIN */
.main{
    margin-left:250px;
    width:calc(100% - 250px);
    padding:30px;
}

/* RESPONSIVE */
@media(max-width:768px){

    .sidebar{
        display:none;
    }

    .main{
        margin-left:0;
        width:100%;
        padding:20px;
    }

    .cards{
        flex-direction:column;
    }
}

        /* ================= MAIN ================= */

        .main{
            margin-left:240px;
            width:100%;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:40px;
        }

        /* ================= FORM CARD ================= */

        .card{
            width:100%;
            max-width:520px;
            background:white;
            padding:35px;
            border-radius:18px;
            box-shadow:0 8px 25px rgba(0,0,0,0.08);
        }

        .card h2{
            text-align:center;
            margin-bottom:25px;
            color:#2c3e50;
        }

        .form-group{
            margin-bottom:18px;
        }

        label{
            display:block;
            margin-bottom:8px;
            font-weight:600;
            color:#444;
            font-size:14px;
        }

        input,
        textarea{
            width:100%;
            padding:12px;
            border:1px solid #dcdcdc;
            border-radius:10px;
            font-size:14px;
            transition:0.3s;
            background:#fafafa;
        }

        input:focus,
        textarea:focus{
            outline:none;
            border-color:#3498db;
            background:white;
            box-shadow:0 0 0 3px rgba(52,152,219,0.15);
        }

        textarea{
            resize:none;
        }

        /* ================= BUTTON ================= */

        .btn{
            width:100%;
            padding:13px;
            border:none;
            border-radius:10px;
            background:#3498db;
            color:white;
            font-size:16px;
            font-weight:600;
            cursor:pointer;
            transition:0.3s;
        }

        .btn:hover{
            background:#2980b9;
            transform:translateY(-2px);
        }

        /* ================= RESPONSIVE ================= */

        @media(max-width:768px){

            .sidebar{
                display:none;
            }

            .main{
                margin-left:0;
                padding:20px;
            }

            .card{
                padding:25px;
            }
        }

    </style>

</head>

<body>

<div class="container">

    <!-- ================= SIDEBAR ================= -->

    <div class="sidebar">

        <h2>🎓 Student Panel</h2>

        <ul>
            <li>
                <a href="{% url 'student_dashboard' %}">
                    📊 Dashboard
                </a>
            </li>

            <li>
                <a href="{% url 'apply_leave' %}" class="active">
                    📝 Apply Leave
                </a>
            </li>

            <li>
                <a href="{% url 'fees_student' %}">
                    💰 Fees
                </a>
            </li>

            <li>
                <a href="{% url 'outing_student' %}">
                    🚶 Outing
                </a>
            </li>

            <li>
                <a href="{% url 'leave_status' %}">
                    📄 Leave Status
                </a>
            </li>

            <li>
                <a href="{% url 'student_room' %}">
                    🏠 Room Info
                </a>
            </li>

            <li>
                <a href="{% url 'feedback_submit' %}">
                    💬 Feedback
                </a>
            </li>
        </ul>

    </div>

    <!-- ================= MAIN ================= -->

    <div class="main">

        <div class="card">

            <h2>📄 Apply Leave</h2>

            <form method="POST">

                {% csrf_token %}

                <div class="form-group">
                    <label>From Date</label>
                    <input type="date" name="from_date" required>
                </div>

                <div class="form-group">
                    <label>To Date</label>
                    <input type="date" name="to_date" required>
                </div>

                <div class="form-group">
                    <label>Reason</label>
                    <textarea name="reason" rows="4" required></textarea>
                </div>

                <div class="form-group">
                    <label>Place</label>
                    <input type="text" name="place" placeholder="Enter destination" required>
                </div>

                <button type="submit" class="btn">
                    🚀 Apply Leave
                </button>

            </form>

        </div>

    </div>

</div>

</body>
</html>
