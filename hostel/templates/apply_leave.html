{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Apply Leave</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f6f9;
        }

        .container {
            display: flex;
            height: 100vh;
        }

        /* SIDEBAR */
        .sidebar {
            width: 220px;
            background: #2c3e50;
            color: white;
            padding: 20px;
        }

        .sidebar h2 {
            text-align: center;
            margin-bottom: 30px;
        }

        /* MAIN CONTENT */
        .main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* FORM CARD */
        .card {
            background: white;
            padding: 30px;
            width: 450px;
            border-radius: 12px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.15);
        }

        .card h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        label {
            font-weight: bold;
            font-size: 14px;
        }

        input, textarea {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            margin-bottom: 15px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 14px;
        }

        textarea {
            resize: none;
        }

        /* BUTTON */
        button {
            width: 100%;
            padding: 12px;
            background: #3498db;
            border: none;
            color: white;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #2980b9;
        }

        /* RESPONSIVE */
        @media (max-width: 600px) {
            .card {
                width: 90%;
            }
            .sidebar {
                display: none;
            }
        }
    </style>

</head>
<body>

<div class="container">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <h2>🎓 Student Panel</h2>
    </div>

    <!-- MAIN -->
    <div class="main">

        <div class="card">
            <h2>📄 Apply Leave</h2>

            <form method="POST">
    {% csrf_token %}

    <label>From Date</label>
    <input type="date" name="from_date" required>

    <label>To Date</label>
    <input type="date" name="to_date" required>

    <label>Reason</label>
    <textarea name="reason" rows="4" required></textarea>

    <label>Place</label>
    <input type="text" name="place" required>

    <button type="submit">🚀 Apply Leave</button>
            </form>
        </div>

    </div>

</div>

</body>
</html>
