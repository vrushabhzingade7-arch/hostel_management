{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Select Hostel</title>

    <style>

        body{
            margin:0;
            font-family:'Segoe UI', sans-serif;
            background:#f4f7fb;
        }

        .container{
            display:flex;
        }

        /* SIDEBAR */
        .sidebar{
            width:240px;
            height:100vh;
            background:#2c3e50;
            color:white;
            padding:20px;
            position:fixed;
        }

        .sidebar h2{
            text-align:center;
            margin-bottom:30px;
        }

        .sidebar ul{
            list-style:none;
            padding:0;
            margin:0;
        }

        .sidebar ul li{
            margin-bottom:5px;
        }

        .sidebar ul li a{
            display:block;
            padding:10px;
            color:white;
            text-decoration:none;
            border-radius:8px;
            transition:0.3s;
        }

        .sidebar ul li a:hover{
            background:rgba(255,255,255,0.15);
            transform:translateX(5px);
        }

        /* MAIN */
        .main{
            margin-left:260px;
            width:100%;
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:30px;
        }

        /* CARD */
        .selection-card{
            background:white;
            width:420px;
            padding:45px;
            border-radius:20px;
            text-align:center;
            box-shadow:0 6px 20px rgba(0,0,0,0.08);
        }

        .selection-card h1{
            margin-bottom:10px;
            color:#2c3e50;
            font-size:30px;
        }

        .selection-card p{
            color:#7f8c8d;
            margin-bottom:35px;
        }

        /* BUTTONS */
        .hostel-btn{
            display:flex;
            align-items:center;
            justify-content:center;
            gap:12px;
            padding:18px;
            margin-bottom:18px;
            border-radius:14px;
            text-decoration:none;
            color:white;
            font-size:18px;
            font-weight:600;
            transition:0.3s;
        }

        .hostel-btn:hover{
            transform:translateY(-4px);
        }

        .boys{
            background:linear-gradient(135deg,#3498db,#2980b9);
        }

        .girls{
            background:linear-gradient(135deg,#e84393,#d63078);
        }

        .boys:hover{
            box-shadow:0 8px 18px rgba(52,152,219,0.3);
        }

        .girls:hover{
            box-shadow:0 8px 18px rgba(232,67,147,0.3);
        }

        /* RESPONSIVE */
        @media(max-width:768px){

            .sidebar{
                display:none;
            }

            .main{
                margin-left:0;
            }

            .selection-card{
                width:100%;
            }
        }

    </style>

</head>

<body>

<div class="container">

    <!-- SIDEBAR -->
    <div class="sidebar">

        <h2>⚙ Admin Panel</h2>

        <ul>
            <li><a href="{% url 'admin_dashboard' %}">📊 Dashboard</a></li>
            <li><a href="{% url 'mark_attendance' %}">📝 Attendance</a></li>
            <li><a href="{% url 'room_info' %}">🏠 Room Info</a></li>
            <li><a href="{% url 'fees_admin' %}">💰 Fees</a></li>
            <li><a href="{% url 'leave_requests' %}">📄 Leave Requests</a></li>
            <li><a href="{% url 'outing_admin' %}">🚪 Outing</a></li>
            <li><a href="{% url 'feedback_admin' %}">💬 Feedback</a></li>
        </ul>

    </div>

    <!-- MAIN -->
    <div class="main">

        <div class="selection-card">

            <h1>🏠 Select Hostel</h1>

            <p>
                Choose which hostel room information you want to manage
            </p>

            <a href="{% url 'room_info' %}?gender=BOYS"
               class="hostel-btn boys">

                👦 Boys Hostel

            </a>

            <a href="{% url 'room_info' %}?gender=GIRLS"
               class="hostel-btn girls">

                👧 Girls Hostel

            </a>

        </div>

    </div>

</div>

</body>
</html>
