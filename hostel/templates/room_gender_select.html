{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Select Hostel</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:'Segoe UI', sans-serif;
            background:#f1f5f9;
        }

        .container{
            display:flex;
        }

        /* SIDEBAR */
        .sidebar{
            width:240px;
            height:100vh;
            background:#1e293b;
            color:white;
            padding:20px;
            position:fixed;
            left:0;
            top:0;
        }

        .sidebar h2{
            text-align:center;
            margin-bottom:35px;
            font-size:30px;
            font-weight:bold;
        }

        .sidebar ul{
            list-style:none;
            padding:0;
        }

        .sidebar ul li{
            margin:12px 0;
        }

        .sidebar ul li a{
            text-decoration:none;
            color:#cbd5f5;
            padding:12px 14px;
            display:block;
            border-radius:10px;
            transition:0.3s;
            font-size:16px;
        }

        .sidebar ul li a:hover{
            background:#334155;
            color:white;
            transform:translateX(5px);
        }

        /* MAIN */
        .main{
            margin-left:240px;
            width:calc(100% - 240px);
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:flex-start;
            padding-top:70px;
        }

        .content{
            width:100%;
            max-width:700px;
        }

        /* TITLE */
        .title{
            text-align:center;
            font-size:55px;
            font-weight:700;
            color:#000;
            margin-bottom:50px;
        }

        /* CARDS */
        .cards{
            display:flex;
            justify-content:center;
            gap:40px;
            flex-wrap:wrap;
        }

        .hostel-card{
            width:250px;
            height:140px;
            background:white;
            border-radius:18px;
            display:flex;
            justify-content:center;
            align-items:center;
            text-decoration:none;
            color:#1e293b;
            font-size:26px;
            font-weight:700;
            gap:14px;
            box-shadow:0 8px 20px rgba(0,0,0,0.08);
            transition:0.3s;
        }

        .hostel-card:hover{
            transform:translateY(-6px);
            box-shadow:0 12px 24px rgba(0,0,0,0.12);
        }

        .emoji{
            font-size:34px;
        }

        /* RESPONSIVE */
        @media(max-width:768px){

            .sidebar{
                display:none;
            }

            .main{
                margin-left:0;
                width:100%;
                padding:40px 20px;
            }

            .title{
                font-size:38px;
            }

            .cards{
                flex-direction:column;
                align-items:center;
            }

            .hostel-card{
                width:100%;
                max-width:320px;
            }
        }

    </style>

</head>

<body>

<div class="container">

    <!-- SIDEBAR -->
    <div class="sidebar">

        <h2>⚙ Admin Panel</h2>

        <ul>
            <li><a href="{% url 'admin_dashboard' %}">📊 Dashboard</a></li>
            <li><a href="{% url 'mark_attendance' %}">📝 Attendance</a></li>
            <li><a href="{% url 'room_info' %}">🏠 Room Info</a></li>
            <li><a href="{% url 'fees_admin' %}">💰 Fees</a></li>
            <li><a href="{% url 'leave_requests' %}">📄 Leave Requests</a></li>
            <li><a href="{% url 'outing_admin' %}">🚪 Outing</a></li>
            <li><a href="{% url 'feedback_admin' %}">💬 Feedback</a></li>
        </ul>

    </div>

    <!-- MAIN -->
    <div class="main">

        <div class="content">

            <div class="title">
                📝 Select Attendance Category
            </div>

            <div class="cards">

                <a href="{% url 'room_info' %}?gender=BOYS"
                   class="hostel-card">

                    <span class="emoji">👦</span>
                    Boys

                </a>

                <a href="{% url 'room_info' %}?gender=GIRLS"
                   class="hostel-card">

                    <span class="emoji">👧</span>
                    Girls

                </a>

            </div>

        </div>

    </div>

</div>

</body>
</html>
