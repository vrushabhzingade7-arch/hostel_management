{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Select Hostel</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: #f4f7fb;
        }

        .container {
            display: flex;
            height: 100vh;
        }

        /* SIDEBAR */
        .sidebar {
            width: 240px;
            background: #2c3e50;
            color: white;
            padding: 20px;
        }

        .sidebar h2 {
            text-align: center;
            margin-bottom: 30px;
        }

        .sidebar ul {
            list-style: none;
            padding: 0;
        }

        .sidebar ul li a {
            display: block;
            padding: 12px;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            margin-bottom: 8px;
            transition: 0.3s;
        }

        .sidebar ul li a:hover {
            background: rgba(255,255,255,0.15);
        }

        /* MAIN */
        .main {
            flex: 1;
            padding: 40px;
        }

        .title {
            font-size: 32px;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 40px;
        }

        .cards {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
        }

        .card {
            width: 260px;
            background: white;
            border-radius: 18px;
            padding: 35px;
            text-align: center;
            text-decoration: none;
            color: #2c3e50;
            box-shadow: 0 4px 14px rgba(0,0,0,0.08);
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-8px);
        }

        .emoji {
            font-size: 60px;
            margin-bottom: 20px;
        }

        .card h3 {
            margin: 0;
            font-size: 24px;
        }

        .boys:hover {
            background: #3498db;
            color: white;
        }

        .girls:hover {
            background: #e84393;
            color: white;
        }

    </style>
</head>

<body>

<div class="container">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <h2>⚙ Admin Panel</h2>

        <ul>
            <li><a href="{% url 'admin_dashboard' %}">📊 Dashboard</a></li>
            <li><a href="{% url 'mark_attendance' %}">📝 Attendance</a></li>
            <li><a href="{% url 'room_info' %}">🏠 Room Info</a></li>
            <li><a href="{% url 'fees_admin' %}">💰 Fees</a></li>
            <li><a href="{% url 'leave_requests' %}">📄 Leave Requests</a></li>
            <li><a href="{% url 'outing_admin' %}">🚪 Outing</a></li>
            <li><a href="{% url 'feedback_admin' %}">💬 Feedback</a></li>
        </ul>
    </div>

    <!-- MAIN -->
    <div class="main">

        <div class="title">🏠 Select Hostel Category</div>

        <div class="cards">

            <a href="{% url 'room_info' %}?gender=BOYS" class="card boys">
                <div class="emoji">👦</div>
                <h3>Boys Hostel</h3>
            </a>

            <a href="{% url 'room_info' %}?gender=GIRLS" class="card girls">
                <div class="emoji">👧</div>
                <h3>Girls Hostel</h3>
            </a>

        </div>

    </div>

</div>

</body>
</html>
