{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Submit Feedback</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:'Segoe UI', sans-serif;
            background:#f1f5f9;
        }

        .container{
            display:flex;
            min-height:100vh;
        }

        /* ================= SIDEBAR ================= */

        .sidebar{
            width:260px;
            height:100vh;
            background:#2c3e50;
            color:white;
            padding:22px;
            position:fixed;
            top:0;
            left:0;
            overflow-y:auto;
            box-shadow:4px 0 20px rgba(0,0,0,0.12);
        }

        .sidebar h2{
            text-align:center;
            margin-bottom:35px;
            font-size:24px;
            font-weight:700;
            letter-spacing:0.5px;
            color:#ffffff;
        }

        .sidebar ul{
            list-style:none;
            padding:0;
            margin:0;
        }

        .sidebar ul li{
            margin-bottom:10px;
        }

        .sidebar ul li a{
            display:flex;
            align-items:center;
            gap:12px;
            padding:14px 16px;
            color:#e2e8f0;
            text-decoration:none;
            border-radius:14px;
            transition:0.3s;
            font-size:15px;
            font-weight:500;
        }

        .sidebar ul li a:hover{
            background:rgba(255,255,255,0.08);
            transform:translateX(4px);
        }

        .sidebar ul li a.active{
            background:#34495e;
            color:white;
            box-shadow:0 4px 14px rgba(37,99,235,0.35);
        }

        /* ================= MAIN ================= */

        .main{
            margin-left:260px;
            width:calc(100% - 260px);
            display:flex;
            justify-content:center;
            align-items:center;
            padding:40px;
        }

        /* ================= CARD ================= */

        .card{
            background:white;
            width:100%;
            max-width:550px;
            padding:38px;
            border-radius:24px;
            box-shadow:0 10px 35px rgba(15,23,42,0.08);
            border:1px solid #e2e8f0;
        }

        .card h2{
            text-align:center;
            margin-bottom:28px;
            color:#0f172a;
            font-size:28px;
        }

        .form-group{
            margin-bottom:22px;
        }

        label{
            display:block;
            margin-bottom:10px;
            font-size:14px;
            font-weight:600;
            color:#334155;
        }

        select,
        textarea{
            width:100%;
            padding:14px;
            border:1px solid #cbd5e1;
            border-radius:14px;
            font-size:15px;
            transition:0.3s;
            background:#f8fafc;
            color:#0f172a;
        }

        select:focus,
        textarea:focus{
            outline:none;
            border-color:#2563eb;
            background:white;
            box-shadow:0 0 0 4px rgba(37,99,235,0.12);
        }

        textarea{
            resize:none;
        }

        /* ================= BUTTON ================= */

        .btn{
            width:100%;
            padding:15px;
            border:none;
            border-radius:14px;
            background:linear-gradient(to right,#2563eb,#3b82f6);
            color:white;
            font-size:16px;
            font-weight:600;
            cursor:pointer;
            transition:0.3s;
            box-shadow:0 6px 18px rgba(37,99,235,0.25);
        }

        .btn:hover{
            transform:translateY(-2px);
            box-shadow:0 10px 22px rgba(37,99,235,0.35);
        }

        /* ================= MESSAGE ================= */

        .success{
            background:#dcfce7;
            color:#166534;
            padding:14px;
            border-radius:12px;
            margin-bottom:18px;
            text-align:center;
            font-size:14px;
            border:1px solid #bbf7d0;
        }

        .error{
            background:#fee2e2;
            color:#991b1b;
            padding:14px;
            border-radius:12px;
            margin-bottom:18px;
            text-align:center;
            font-size:14px;
            border:1px solid #fecaca;
        }

        /* ================= MOBILE ================= */

        @media(max-width:768px){

            .sidebar{
                display:none;
            }

            .main{
                margin-left:0;
                width:100%;
                padding:20px;
            }

            .card{
                padding:28px 22px;
            }

            .card h2{
                font-size:24px;
            }
        }

    </style>

</head>

<body>

<div class="container">

    <!-- ================= SIDEBAR ================= -->

    <div class="sidebar">

        <h2>🎓 Student Panel</h2>

        <ul>

            <li>
                <a href="{% url 'student_dashboard' %}">
                    📊 Dashboard
                </a>
            </li>

            <li>
                <a href="{% url 'apply_leave' %}">
                    📝 Apply Leave
                </a>
            </li>

            <li>
                <a href="{% url 'fees_student' %}">
                    💰 Fees
                </a>
            </li>

            <li>
                <a href="{% url 'outing_student' %}">
                    🚶 Outing
                </a>
            </li>

            <li>
                <a href="{% url 'leave_status' %}">
                    📄 Leave Status
                </a>
            </li>

            <li>
                <a href="{% url 'student_room' %}">
                    🏠 Room Info
                </a>
            </li>

            <li>
                <a href="{% url 'feedback_submit' %}" class="active">
                    💬 Feedback
                </a>
            </li>
            <li><a href="{% url 'logout' %}">🚪Logout</a></li>

        </ul>

    </div>

    <!-- ================= MAIN ================= -->

    <div class="main">

        <div class="card">

            <h2>💬 Submit Feedback</h2>

            {% if messages %}
                {% for message in messages %}
                    <div class="success">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}

            <form method="POST">

                {% csrf_token %}

                <div class="form-group">

                    <label>Feedback Type</label>

                    <select name="type" required>
                        <option value="">-- Select Type --</option>
                        <option value="Mess">🍽️ Mess</option>
                        <option value="Hostel">🏠 Hostel</option>
                    </select>

                </div>

                <div class="form-group">

                    <label>Your Message</label>

                    <textarea
                        name="message"
                        rows="5"
                        placeholder="Write your feedback here..."
                        required
                    ></textarea>

                </div>

                <button type="submit" class="btn">
                    🚀 Submit Feedback
                </button>

            </form>

        </div>

    </div>

</div>

</body>
</html>
