{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Submit Feedback</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:'Segoe UI', sans-serif;
            background:#f4f7fb;
        }

        .container{
            display:flex;
            min-height:100vh;
        }

        /* ================= SIDEBAR ================= */
/* SIDEBAR */
.sidebar{
    width:250px;
    height:100vh;
    background:#2c3e50;
    color:white;
    padding:20px;
    position:fixed;
    top:0;
    left:0;
    overflow-y:auto;
}

.sidebar h2{
    text-align:center;
    margin-bottom:30px;
    font-size:30px;
    line-height:1.4;
}

.sidebar ul{
    list-style:none;
    padding:0;
    margin:0;
}

.sidebar ul li{
    margin-bottom:6px;
}

.sidebar ul li a{
    display:flex;
    align-items:center;
    gap:10px;
    padding:12px 14px;
    color:#e2e8f0;
    text-decoration:none;
    border-radius:10px;
    transition:0.3s;
    font-size:16px;
    font-weight:500;
}

.sidebar ul li a:hover{
    background:#34495e;
    color:white;
    transform:translateX(5px);
}

/* MAIN */
.main{
    margin-left:250px;
    width:calc(100% - 250px);
    padding:30px;
}

/* RESPONSIVE */
@media(max-width:768px){

    .sidebar{
        display:none;
    }

    .main{
        margin-left:0;
        width:100%;
        padding:20px;
    }
}

        /* ================= MAIN ================= */

        .main{
            margin-left:240px;
            width:100%;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:40px;
        }

        /* ================= CARD ================= */

        .card{
            background:white;
            width:100%;
            max-width:500px;
            padding:35px;
            border-radius:18px;
            box-shadow:0 8px 25px rgba(0,0,0,0.08);
        }

        .card h2{
            text-align:center;
            margin-bottom:25px;
            color:#2c3e50;
        }

        .form-group{
            margin-bottom:18px;
        }

        label{
            display:block;
            margin-bottom:8px;
            font-size:14px;
            font-weight:600;
            color:#444;
        }

        select,
        textarea{
            width:100%;
            padding:12px;
            border:1px solid #dcdcdc;
            border-radius:10px;
            font-size:14px;
            transition:0.3s;
            background:#fafafa;
        }

        select:focus,
        textarea:focus{
            outline:none;
            border-color:#3498db;
            background:white;
            box-shadow:0 0 0 3px rgba(52,152,219,0.15);
        }

        textarea{
            resize:none;
        }

        /* ================= BUTTON ================= */

        .btn{
            width:100%;
            padding:13px;
            border:none;
            border-radius:10px;
            background:#3498db;
            color:white;
            font-size:16px;
            font-weight:600;
            cursor:pointer;
            transition:0.3s;
        }

        .btn:hover{
            background:#2980b9;
            transform:translateY(-2px);
        }

        /* ================= MESSAGE ================= */

        .success{
            background:#d4edda;
            color:#155724;
            padding:12px;
            border-radius:10px;
            margin-bottom:15px;
            text-align:center;
            font-size:14px;
        }

        .error{
            background:#f8d7da;
            color:#721c24;
            padding:12px;
            border-radius:10px;
            margin-bottom:15px;
            text-align:center;
            font-size:14px;
        }

        /* ================= RESPONSIVE ================= */

        @media(max-width:768px){

            .sidebar{
                display:none;
            }

            .main{
                margin-left:0;
                padding:20px;
            }

            .card{
                padding:25px;
            }
        }

    </style>

</head>

<body>

<div class="container">

    <!-- ================= SIDEBAR ================= -->

    <div class="sidebar">

        <h2>🎓 Student Panel</h2>

        <ul>
            <li>
                <a href="{% url 'student_dashboard' %}">
                    📊 Dashboard
                </a>
            </li>

            <li>
                <a href="{% url 'apply_leave' %}">
                    📝 Apply Leave
                </a>
            </li>

            <li>
                <a href="{% url 'fees_student' %}">
                    💰 Fees
                </a>
            </li>

            <li>
                <a href="{% url 'outing_student' %}">
                    🚶 Outing
                </a>
            </li>

            <li>
                <a href="{% url 'leave_status' %}">
                    📄 Leave Status
                </a>
            </li>

            <li>
                <a href="{% url 'student_room' %}">
                    🏠 Room Info
                </a>
            </li>

            <li>
                <a href="{% url 'feedback_submit' %}" class="active">
                    💬 Feedback
                </a>
            </li>
        </ul>

    </div>

    <!-- ================= MAIN ================= -->

    <div class="main">

        <div class="card">

            <h2>📝 Submit Feedback</h2>

            {% if messages %}
                {% for message in messages %}
                    <div class="success">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}

            <form method="POST">

                {% csrf_token %}

                <div class="form-group">

                    <label>Feedback Type</label>

                    <select name="type" required>
                        <option value="">-- Select Type --</option>
                        <option value="Mess">🍽️ Mess</option>
                        <option value="Hostel">🏠 Hostel</option>
                    </select>

                </div>

                <div class="form-group">

                    <label>Your Message</label>

                    <textarea 
                        name="message"
                        rows="5"
                        placeholder="Write your feedback here..."
                        required
                    ></textarea>

                </div>

                <button type="submit" class="btn">
                    🚀 Submit Feedback
                </button>

            </form>

        </div>

    </div>

</div>

</body>
</html>
