{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Select Attendance Category</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: #f4f7fb;
        }

        /* SIDEBAR */
        .sidebar {
            width: 240px;
            height: 100vh;
            background: #2c3e50;
            color: white;
            padding: 20px;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1000;
        }

        .sidebar h2 {
            text-align: center;
            margin-bottom: 30px;
        }

        .sidebar ul {
            list-style: none;
            padding: 0;
        }

        .sidebar ul li a {
            display: block;
            padding: 12px;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            transition: 0.3s;
        }

        .sidebar ul li a:hover,
        .sidebar ul li a.active {
            background: rgba(255,255,255,0.2);
            transform: translateX(5px);
        }

        /* MAIN */
        .main {
            margin-left: 240px;
            padding: 30px;
            width: calc(100% - 240px);
            min-height: 100vh;

            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        h1 {
            margin-bottom: 40px;
            color: #2c3e50;
            ;
        }

        /* CARDS */
        .cards{
            display:flex;
            justify-content:center;
            gap:40px;
            flex-wrap:wrap;
        }

        .card{
            width:250px;
            height:140px;
            background:white;
            border-radius:18px;
            display:flex;
            justify-content:center;
            align-items:center;
            text-decoration:none;
            color:#2c3e50;
            font-size:24px;
            font-weight:700;
            gap:14px;
            box-shadow:0 8px 20px rgba(0,0,0,0.08);
            transition:0.3s;
        }

        .card:hover{
            transform:translateY(-6px);
            box-shadow:0 12px 24px rgba(0,0,0,0.12);
            background:#3498db;
            color:white;
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .sidebar {
                display: none;
            }

            .main {
                margin-left: 0;
                width: 100%;
            }
        }

    </style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h2>⚙ Admin Panel</h2>

    <ul>
        <li><a href="{% url 'admin_dashboard' %}">📊 Dashboard</a></li>
        <li><a href="{% url 'mark_attendance' %}" class="active">📝 Attendance</a></li>
        <li><a href="{% url 'room_info' %}">🏠 Room Info</a></li>
        <li><a href="{% url 'leave_requests' %}">📄 Leave Requests</a></li>
        <li><a href="{% url 'fees_admin' %}">💰 Fees</a></li>
        <li><a href="{% url 'outing_admin' %}">🚪 Outing</a></li>
        <li><a href="{% url 'feedback_admin' %}">💬 Feedback</a></li>
    </ul>
</div>

<!-- MAIN -->
<div class="main">

    <h1>📝 Select Attendance Category</h1>

    <div class="cards">

        <a href="{% url 'mark_attendance' %}?gender=BOYS" class="card">
            👦 Boys
        </a>

        <a href="{% url 'mark_attendance' %}?gender=GIRLS" class="card">
            👧 Girls
        </a>

    </div>

</div>

</body>
</html>
