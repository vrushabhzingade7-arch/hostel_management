{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Mark Attendance</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: #f4f7fb;
        }

        /* SIDEBAR */
        .sidebar {
            width: 240px;
            height: 100vh;
            background: #2c3e50;
            color: white;
            padding: 20px;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1000;
        }

        .sidebar-header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 30px;
            border-bottom: 1px solid rgba(255,255,255,0.2);
            padding-bottom: 15px;
        }

        .sidebar-header .icon {
            font-size: 26px;
        }

        .sidebar-header .title {
            letter-spacing: 1px;
        }

        .sidebar ul {
            list-style: none;
            padding: 0;
        }

        .sidebar ul li a {
            display: block;
            padding: 12px;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            transition: 0.3s;
        }

        .sidebar ul li a:hover,
        .sidebar ul li a.active {
            background: rgba(255,255,255,0.2);
            transform: translateX(5px);
        }

        /* MAIN */
        .main {
            margin-left: 240px;
            padding: 30px;
            width: calc(100% - 240px);
            min-height: 100vh;
        }

        h2 {
            margin-bottom: 20px;
            color: #2c3e50;
        }

        /* CARD */
        .card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            overflow-x: auto;
        }

        /* TABLE */
        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 500px;
        }

        thead {
            position: sticky;
            top: 0;
            background: #3b82f6;
            color: white;
        }

        th, td {
            padding: 12px;
            text-align: left;
        }

        td {
            border-bottom: 1px solid #eee;
        }

        tr:hover {
            background: #f9fafb;
        }

        /* RADIO */
        .radio-group {
            display: flex;
            gap: 15px;
        }

        input[type="radio"] {
            transform: scale(1.2);
            cursor: pointer;
        }

        .present {
            color: green;
            font-weight: bold;
        }

        .absent {
            color: red;
            font-weight: bold;
        }

        /* BUTTON */
        .btn {
            margin-top: 20px;
            padding: 12px 25px;
            background: #22c55e;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover {
            background: #16a34a;
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .sidebar {
                display: none;
            }

            .main {
                margin-left: 0;
                width: 100%;
            }
        }

    </style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">

    <div class="sidebar-header">
        <span class="icon">⚙</span>
        <span class="title">Admin Panel</span>
    </div>

    <ul>
        <li><a href="{% url 'admin_dashboard' %}">📊 Dashboard</a></li>
        <li><a href="{% url 'mark_attendance' %}" class="active">📝 Attendance</a></li>
        <li><a href="{% url 'room_info' %}">🏠 Room Info</a></li>
        <li><a href="{% url 'leave_requests' %}">📄 Leave Requests</a></li>
        <li><a href="{% url 'fees_admin' %}">💰 Fees</a></li>
        <li><a href="{% url 'outing_admin' %}">🚪 Outing</a></li>
        <li><a href="{% url 'feedback_admin' %}">💬 Feedback</a></li>
    </ul>

</div>

<!-- MAIN -->
<div class="main">

    <h2>📝 Mark Attendance - {{ gender }}</h2>

    <div class="card">
        <form method="POST">
            {% csrf_token %}

            <table>
                <thead>
                    <tr>
                        <th>👤 Student</th>
                        <th>Status</th>
                    </tr>
                </thead>

                <tbody>
                    {% for student in students %}
                    <tr>
                        <td>{{ student.user.username }}</td>

                        <td>
                            <div class="radio-group">
                                <label class="present">
                                    <input type="radio" name="status_{{ student.id }}" value="Present" required>
                                    Present
                                </label>

                                <label class="absent">
                                    <input type="radio" name="status_{{ student.id }}" value="Absent">
                                    Absent
                                </label>
                            </div>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>

            </table>

            <button type="submit" class="btn">✔ Save Attendance</button>

        </form>
    </div>

</div>

</body>
</html>
