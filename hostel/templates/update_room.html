{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Update Room</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f4f7fb;
        }

        .container {
            display: flex;
        }

        /* SIDEBAR (SAME AS ALL PAGES) */
        .sidebar {
            width: 240px;
            height: 100vh;
            background: #2c3e50;
            color: white;
            padding: 20px;
            position: fixed;
            top: 0;
            left: 0;
        }

        .sidebar h2 {
            text-align: center;
            margin-bottom: 30px;
        }

        .sidebar ul {
            list-style: none;
            padding: 0;
        }

        .sidebar ul li a {
            display: block;
            padding: 12px;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            transition: 0.3s;
        }

        .sidebar ul li a:hover {
            background: rgba(255,255,255,0.2);
            transform: translateX(5px);
        }

        /* MAIN */
        .main {
            margin-left: 240px;
            width: calc(100% - 240px);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px;
        }

        /* CARD */
        .card {
            width: 100%;
            max-width: 500px;
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 6px 18px rgba(0,0,0,0.1);
        }

        .card h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #2c3e50;
        }

        .info {
            margin-bottom: 10px;
            font-size: 14px;
            color: #555;
        }

        label {
            font-weight: 600;
            margin-top: 15px;
            display: block;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 6px;
            border: 1px solid #ccc;
            border-radius: 8px;
        }

        input:focus {
            outline: none;
            border-color: #3b82f6;
        }

        /* BUTTONS */
        .btn-group {
            margin-top: 20px;
            display: flex;
            justify-content: space-between;
            gap: 10px;
        }

        .btn {
            flex: 1;
            text-align: center;
            padding: 10px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-size: 14px;
            text-decoration: none;
        }

        .save-btn {
            background: #22c55e;
            color: white;
        }

        .save-btn:hover {
            background: #16a34a;
        }

        .back-btn {
            background: #ef4444;
            color: white;
        }

        .back-btn:hover {
            background: #dc2626;
        }

        /* MOBILE */
        @media (max-width: 768px) {
            .sidebar {
                display: none;
            }

            .main {
                margin-left: 0;
                width: 100%;
                padding: 20px;
            }
        }

    </style>
</head>

<body>

<div class="container">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <h2>⚙ Admin Panel</h2>

        <ul>
            <li><a href="{% url 'admin_dashboard' %}">📊 Dashboard</a></li>
            <li><a href="{% url 'mark_attendance' %}">📝 Attendance</a></li>
            <li><a href="{% url 'room_info' %}">🏠 Room Info</a></li>
            <li><a href="{% url 'leave_requests' %}">📄 Leave Requests</a></li>
            <li><a href="{% url 'fees_admin' %}">💰 Fees</a></li>
            <li><a href="{% url 'outing_admin' %}">🚪 Outing</a></li>
            <li><a href="{% url 'feedback_admin' %}">💬 Feedback</a></li>
        </ul>
    </div>

    <!-- MAIN -->
    <div class="main">

        <div class="card">

            <h2>✏ Update Room</h2>

            <div class="info">
                👤 <b>Student:</b> {{ student.user.username }}
            </div>

            <div class="info">
                🆔 <b>Hostel ID:</b> {{ student.hostel_id }}
            </div>

            <form method="POST">
                {% csrf_token %}

                <label>Room Number</label>
                <input type="text" name="room_no" value="{{ student.room_no }}" required>

                <div class="btn-group">
                    <a href="{% url 'room_info' %}" class="btn back-btn">⬅ Back</a>
                    <button type="submit" class="btn save-btn">💾 Save</button>
                </div>
            </form>

        </div>

    </div>

</div>

</body>
</html>
